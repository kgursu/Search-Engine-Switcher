name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Chrome zip
        run: |
          cd chrome
          zip -r ../switch-search-engine-chrome.zip . -x "*.DS_Store"

      - name: Build Firefox zip
        run: |
          cd firefox
          zip -r ../switch-search-engine-firefox.zip . -x "*.DS_Store"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            switch-search-engine-chrome.zip
            switch-search-engine-firefox.zip
          body_path: RELEASE_NOTES.md
